services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: . # MUDOU AQUI: O Dockerfile agora está na raiz
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle exec rails db:prepare &&
               bundle exec rails server -b '0.0.0.0'"
    volumes:
      - .:/app # MUDOU AQUI: Mapeia a raiz do host para o /app do container
      - gem_cache:/usr/local/bundle
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - RAILS_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/wishlist_development

volumes:
  postgres_data:
  gem_cache: